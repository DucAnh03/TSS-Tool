name: Qwen2.5 QLoRA Fine-tuning Pipeline

on:
  push:
    branches: ["main", "master"]
    paths:
      - "config/qwen_params.yaml"
      - "llm/train.py"
      - "scripts/llm_kaggle_trigger.py"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "config/qwen_params.yaml"
      - "llm/train.py"
      - "scripts/llm_kaggle_trigger.py"

permissions:
  pull-requests: write
  contents: read

jobs:
  train-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cài dependencies
        run: pip install "kaggle<1.8.0" pyyaml requests PyYAML

      - name: Trigger Kaggle → QLoRA fine-tune Qwen2.5-1.5B
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:      ${{ secrets.KAGGLE_KEY }}
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_ADAPTER_REPO: ${{ secrets.HF_ADAPTER_REPO }}
        run: |
          mkdir -p ~/.kaggle
          printf '{"username":"%s","key":"%s"}' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          python scripts/llm_kaggle_trigger.py

      - name: Setup CML
        uses: iterative/setup-cml@v2

      - name: CML report → comment vào PR
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          cat > report.md << 'REPORT'
          # 🤖 Qwen2.5-1.5B QLoRA Fine-tuning Report

          > **Trigger:** `config/qwen_params.yaml` thay đổi
          > **Runner:** Kaggle T4 GPU (free tier)
          > **Dataset:** `bkai-foundation-models/vi-alpaca` (500 train / 100 eval)

          ## 📊 Training Metrics
          REPORT

          cat metrics.txt >> report.md

          echo "" >> report.md
          echo "## 📈 Loss Curve" >> report.md
          cml publish loss_curve.png --md >> report.md

          echo "" >> report.md
          echo "---" >> report.md
          echo "*Auto-generated by GitHub Actions + CML*" >> report.md

          cml comment create report.md
