name: MLOps CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  voice:
    name: Voice Pipeline (openWakeWord)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: make setup

      - name: Run voice quick eval
        run: make voice_quick

      - name: Upload voice artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voice-artifacts
          path: artifacts/latest/

  # ────────────────────────────────────────────────────────────────────────────
  vision:
    name: Vision Pipeline (CIFAR-10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: make setup

      - name: Train & evaluate SimpleCNN
        run: make vision_quick

      - name: Upload vision artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vision-artifacts
          path: artifacts/latest/

  # ────────────────────────────────────────────────────────────────────────────
  report:
    name: CML Report
    runs-on: ubuntu-latest
    needs: [voice, vision]
    permissions:
      contents: write       # needed to push artifacts/latest/
      pull-requests: write  # needed for CML PR comments

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: make setup

      # Merge artifacts from both pipeline jobs
      - name: Download voice artifacts
        uses: actions/download-artifact@v4
        with:
          name: voice-artifacts
          path: artifacts/latest/

      - name: Download vision artifacts
        uses: actions/download-artifact@v4
        with:
          name: vision-artifacts
          path: artifacts/latest/

      - name: Generate Markdown report
        run: make report

      # ── CML ──────────────────────────────────────────────────────────────
      - name: Setup CML
        uses: iterative/setup-cml@v2

      - name: Post CML comment
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml comment create report.md

      # ── Commit updated artifacts/latest/ back to the branch ──────────────
      - name: Commit metrics snapshot
        if: github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/latest/
          git diff --cached --quiet || git commit -m "ci: update artifacts/latest [skip ci]"
          git push
