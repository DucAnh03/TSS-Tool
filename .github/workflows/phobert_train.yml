name: PhoBERT Training Pipeline

on:
  push:
    branches: ["main", "master"]
    paths:
      - "config/params.yaml"
      - "phobert/train.py"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "config/params.yaml"
      - "phobert/train.py"

permissions:
  pull-requests: write
  contents: read

jobs:
  train-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cài Kaggle API + dependencies
        run: pip install kaggle pyyaml requests

      - name: Cấu hình Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:      ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Trigger Kaggle kernel → train PhoBERT
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:      ${{ secrets.KAGGLE_KEY }}
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_MODEL_REPO:   ${{ secrets.HF_MODEL_REPO }}
        run: python scripts/kaggle_trigger.py

      - name: Setup CML
        uses: iterative/setup-cml@v2

      - name: Tạo CML report → post vào PR
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          cat > report.md << 'REPORT'
          # 🤖 PhoBERT Training Report

          > **Trigger:** `config/params.yaml` thay đổi
          > **Runner:** Kaggle T4 GPU (free)
          > **Model:** vinai/phobert-base → HuggingFace Hub

          ## 📊 Metrics
          REPORT

          cat metrics.txt >> report.md

          echo "" >> report.md
          echo "## 🖼️ Confusion Matrix" >> report.md
          cml publish confusion_matrix.png --md >> report.md

          echo "" >> report.md
          echo "---" >> report.md
          echo "*Auto-generated by GitHub Actions + CML*" >> report.md

          cml comment create report.md
